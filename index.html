<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>NTHU Vehicle Permit Studio</title>
    <link rel="icon" href="logo/NTHU.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="commit-bg" id="commitBg" aria-hidden="true"></div>
    <div class="nv-glow" aria-hidden="true"></div>

    <header class="nv-topbar">
      <div class="nv-brand">
        <span class="nv-brand-mark">NTHU</span>
        <span class="nv-brand-sub">Vehicle Permit</span>
      </div>
      <nav class="nv-nav" aria-label="Main">
        <span class="nv-nav-item is-active">Designer</span>
      </nav>
      <a
        class="nv-github"
        href="https://github.com/SeanChangX"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="SeanChangX on GitHub"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path
            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
          />
        </svg>
      </a>
    </header>

    <main class="page">
      <section class="hero">
        <h1>Permit generator</h1>
        <p class="hero-lead">
          Bicycle and motorcycle badges. Output <strong>SVG</strong>, <strong>PNG</strong>, and
          <strong>JPG</strong> at print size.
        </p>
      </section>

      <section class="controls">
        <div class="field field-color">
          <span class="field-label">Theme color</span>
          <div class="color-row">
            <input id="primaryColor" type="color" value="#748e48" title="Theme" />
            <input id="primaryHex" type="text" value="#748E48" maxlength="7" spellcheck="false" />
          </div>
        </div>

        <fieldset class="field field-tone">
          <legend class="field-label">Surface</legend>
          <div class="tone-row">
            <label class="tone-chip">
              <input type="radio" name="tone" value="dark" checked />
              <span>Dark</span>
            </label>
            <label class="tone-chip">
              <input type="radio" name="tone" value="light" />
              <span>Light</span>
            </label>
          </div>
        </fieldset>

        <label class="field">
          <span class="field-label">Academic year</span>
          <input id="yearText" type="number" min="100" max="199" step="1" inputmode="numeric" value="115" />
        </label>

        <label class="field">
          <span class="field-label">Serial (preview)</span>
          <input id="serialText" type="text" value="X123456" />
        </label>

        <label class="field field-file">
          <span class="field-label">Logo (SVG / PNG / JPG)</span>
          <input id="logoInput" type="file" accept=".svg,.png,.jpg,.jpeg,image/*" />
        </label>

        <label class="field">
          <span class="field-label">Logo size</span>
          <div class="slider-row">
            <input id="logoScale" type="range" min="50" max="150" value="100" />
            <output id="logoScaleOut" for="logoScale">100%</output>
          </div>
        </label>

        <div class="field-logo-tint-row" role="group" aria-label="Logo tint per vehicle">
          <div class="field-logo-tint-pair">
            <div class="field field-color">
              <span class="field-label">Bicycle logo color</span>
              <div class="color-row">
                <input id="logoTintColorBike" type="color" value="#748e48" title="Bicycle logo tint" />
                <input
                  id="logoTintHexBike"
                  type="text"
                  value="#748E48"
                  maxlength="7"
                  spellcheck="false"
                  aria-label="Bicycle logo tint hex"
                />
              </div>
            </div>
            <label class="field field-tint-strength">
              <span class="field-label">tint strength</span>
              <div class="slider-row">
                <input id="logoTintStrengthBike" type="range" min="0" max="100" value="0" />
                <output id="logoTintStrengthBikeOut" for="logoTintStrengthBike">0%</output>
              </div>
            </label>
          </div>

          <div class="field-logo-tint-pair">
            <div class="field field-color">
              <span class="field-label">Motorcycle logo color</span>
              <div class="color-row">
                <input id="logoTintColorMotor" type="color" value="#748e48" title="Motorcycle logo tint" />
                <input
                  id="logoTintHexMotor"
                  type="text"
                  value="#748E48"
                  maxlength="7"
                  spellcheck="false"
                  aria-label="Motorcycle logo tint hex"
                />
              </div>
            </div>
            <label class="field field-tint-strength">
              <span class="field-label">tint strength</span>
              <div class="slider-row">
                <input id="logoTintStrengthMotor" type="range" min="0" max="100" value="0" />
                <output id="logoTintStrengthMotorOut" for="logoTintStrengthMotor">0%</output>
              </div>
            </label>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="exportAllBtn" class="btn btn-primary">Export all formats</button>
        </div>
      </section>

      <section class="preview-grid" id="preview">
        <article class="card">
          <div class="card-head">
            <h2>Bicycle</h2>
            <span class="card-meta">7 x 3 cm</span>
          </div>
          <div id="bikePreview" class="svg-wrap"></div>
        </article>
        <article class="card">
          <div class="card-head">
            <h2>Motorcycle</h2>
            <span class="card-meta">Dia 6.2 cm</span>
          </div>
          <div id="motorPreview" class="svg-wrap"></div>
        </article>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
